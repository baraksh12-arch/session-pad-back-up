name: Build SessionPad Bridge

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'bridge/**'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: bridge
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build SessionPadBridge.exe
        working-directory: bridge
        run: pyinstaller SessionPadBridge.spec --noconfirm

      - name: Smoke test executable
        working-directory: bridge
        run: dist\SessionPadBridge.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SessionPadBridge-windows
          path: bridge/dist/SessionPadBridge.exe
