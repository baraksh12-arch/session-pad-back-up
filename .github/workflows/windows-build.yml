# SessionPad Bridge — Windows CI build
# Build system: PyInstaller (Release one-file exe via SessionPadBridge.spec).
# This project is Python-based; there is no CMake/MSBuild configuration.

name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: bridge
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Release executable
        working-directory: bridge
        run: pyinstaller SessionPadBridge.spec --noconfirm

      - name: Verify executable
        working-directory: bridge
        run: |
          if (-not (Test-Path "dist\SessionPadBridge.exe")) {
            Write-Error "dist\SessionPadBridge.exe was not produced"
            exit 1
          }
          dist\SessionPadBridge.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bridge-Windows
          path: bridge/dist/SessionPadBridge.exe
